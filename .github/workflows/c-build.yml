name: C build

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  meson:
    name: Meson ${{ matrix.compiler }} ${{ matrix.mode }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - gcc
          - clang
        mode:
          - normal
          - asan-ubsan

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            clang \
            dbus-daemon \
            git \
            librsvg2-bin \
            meson \
            ninja-build \
            pkg-config \
            libgtk-4-dev \
            libgdk-pixbuf-2.0-dev \
            libjson-glib-dev \
            libcairo2-dev \
            libwayland-dev \
            wl-clipboard \
            wayland-protocols

      - name: Install gtk4-layer-shell
        run: |
          set -euo pipefail
          git clone --depth 1 --branch v1.3.0 https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          meson setup /tmp/gtk4-layer-shell/build /tmp/gtk4-layer-shell \
            --prefix=/usr \
            -Dexamples=false \
            -Ddocs=false \
            -Dtests=false \
            -Dintrospection=false \
            -Dvapi=false
          meson compile -C /tmp/gtk4-layer-shell/build
          sudo meson install -C /tmp/gtk4-layer-shell/build
          sudo ldconfig

      - name: Configure build
        env:
          CC: ${{ matrix.compiler }}
          SHAULA_CI_MODE: ${{ matrix.mode }}
        run: |
          set -euo pipefail
          args=(-Dwerror=true)
          if [ "${SHAULA_CI_MODE}" = "asan-ubsan" ]; then
            lundef=true
            if [ "${CC}" = "clang" ]; then
              lundef=false
            fi
            args+=(
              -Db_sanitize=address,undefined
              -Db_lundef="${lundef}"
            )
          fi
          meson setup build-ci "${args[@]}"

      - name: Compile
        run: meson compile -C build-ci

      - name: Run tests
        # Desktop contract fixtures depend on simulated Niri/Wayland state and
        # belong to local QA rather than the headless GitHub runner.
        run: meson test -C build-ci --print-errorlogs --no-suite contract

      - name: Verify install payload
        run: |
          DESTDIR="${PWD}/build-ci/stage" meson install -C build-ci
          for binary in shaula shaula-overlay shaula-preview shaula-settings shaula-shortcut-provider shaula-crop-image shaula-portal-screenshot shaula-clipboard-provider; do
            test -x "build-ci/stage/usr/local/bin/${binary}"
          done
          test -f build-ci/stage/usr/local/share/applications/shaula.desktop
          test -f build-ci/stage/usr/local/share/shaula/release-manifest.txt
          test ! -e build-ci/stage/usr/local/share/icons/hicolor/index.theme

      - name: Verify AUR .SRCINFO regeneration
        run: |
          set -euo pipefail
          docker run --rm \
            --volume "${PWD}:/work:ro" \
            archlinux:base-devel \
            bash -euxo pipefail -c '
              useradd --create-home builder
              for package in shaula shaula-bin; do
                cp -a "/work/aur/${package}" "/tmp/${package}"
                chown -R builder:builder "/tmp/${package}"
                su builder -c "cd /tmp/${package} && makepkg --printsrcinfo" \
                  > "/tmp/${package}.SRCINFO"
                diff -u "/work/aur/${package}/.SRCINFO" \
                  "/tmp/${package}.SRCINFO"
              done
            '
