name: Release
run-name: ${{ github.ref_name }} release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate-release-identity:
    name: Validate release identity
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Require exact tag and release notes
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          bash scripts/qa/assert-release-contract.sh "${PWD}" "" "${TAG_NAME}"

  build-release:
    name: Build Linux ${{ matrix.arch }} release
    needs: validate-release-identity
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Enable AArch64 emulation
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build, test, and package
        env:
          ARCH: ${{ matrix.arch }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          docker run --rm \
            --platform "${PLATFORM}" \
            --env ARCH="${ARCH}" \
            --volume "${PWD}:/work" \
            --workdir /work \
            ubuntu:24.04 \
            bash -euxo pipefail -c '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                binutils \
                build-essential \
                ca-certificates \
                dbus-daemon \
                file \
                git \
                jq \
                meson \
                ninja-build \
                pkg-config \
                libgtk-4-dev \
                libgdk-pixbuf-2.0-dev \
                libjson-glib-dev \
                libcairo2-dev \
                libwayland-dev \
                wayland-protocols

              git clone --depth 1 --branch v1.3.0 \
                https://github.com/wmww/gtk4-layer-shell.git \
                /tmp/gtk4-layer-shell
              meson setup /tmp/gtk4-layer-shell/build /tmp/gtk4-layer-shell \
                --prefix=/usr \
                -Dexamples=false \
                -Ddocs=false \
                -Dtests=false \
                -Dintrospection=false \
                -Dvapi=false
              meson compile -C /tmp/gtk4-layer-shell/build
              meson install -C /tmp/gtk4-layer-shell/build
              ldconfig

              build_dir="build-release-${ARCH}"
              output_dir="dist/${ARCH}"
              rm -rf "${build_dir}" "${output_dir}"
              meson setup "${build_dir}" \
                --prefix=/usr \
                --buildtype=release \
                --strip \
                -Db_lto=true \
                -Dwerror=true
              meson compile -C "${build_dir}"
              meson test -C "${build_dir}" --print-errorlogs

              mkdir -p "${output_dir}"
              DESTDIR="${PWD}/${output_dir}/stage" \
                meson install -C "${build_dir}"
              archive="${PWD}/${output_dir}/shaula-linux-${ARCH}.tar.gz"
              tar -C "${output_dir}/stage/usr" -czf "${archive}" bin share
              bash scripts/qa/assert-release-archive.sh \
                "${PWD}" "${archive}" "${ARCH}"
            '

      - name: Upload architecture archive
        uses: actions/upload-artifact@v4
        with:
          name: shaula-linux-${{ matrix.arch }}
          path: dist/${{ matrix.arch }}/shaula-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish Linux release
    needs: build-release
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: shaula-linux-*
          path: dist
          merge-multiple: true

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends binutils gh jq

      - name: Build and verify checksums
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          (
            cd dist
            sha256sum \
              shaula-linux-x86_64.tar.gz \
              shaula-linux-aarch64.tar.gz \
              > SHA256SUMS
          )
          bash scripts/qa/assert-release-contract.sh \
            "${PWD}" "${PWD}/dist" "${TAG_NAME}"

      - name: Verify AUR .SRCINFO regeneration
        run: |
          set -euo pipefail
          docker run --rm \
            --volume "${PWD}:/work:ro" \
            archlinux:base-devel \
            bash -euxo pipefail -c '
              useradd --create-home builder
              for package in shaula shaula-bin; do
                su builder -c "cd /work/aur/${package} && makepkg --printsrcinfo" \
                  > "/tmp/${package}.SRCINFO"
                diff -u "/work/aur/${package}/.SRCINFO" \
                  "/tmp/${package}.SRCINFO"
              done
            '

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          notes_file="docs/release-${TAG_NAME}.md"
          prerelease_args=()
          case "${TAG_NAME}" in
            *alpha*|*beta*|*rc*) prerelease_args=(--prerelease) ;;
          esac

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "${TAG_NAME}" \
              --notes-file "${notes_file}" \
              "${prerelease_args[@]}"
            gh release upload "${TAG_NAME}" \
              dist/shaula-linux-x86_64.tar.gz \
              dist/shaula-linux-aarch64.tar.gz \
              dist/SHA256SUMS \
              --clobber
          else
            gh release create "${TAG_NAME}" \
              dist/shaula-linux-x86_64.tar.gz \
              dist/shaula-linux-aarch64.tar.gz \
              dist/SHA256SUMS \
              --title "${TAG_NAME}" \
              --notes-file "${notes_file}" \
              "${prerelease_args[@]}"
          fi
