name: Release
run-name: ${{ github.ref_name }} release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish-linux-x86_64:
    name: Build and publish Linux x86_64 release
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            git \
            gh \
            jq \
            meson \
            ninja-build \
            pkg-config \
            libgtk-4-dev \
            libgdk-pixbuf-2.0-dev \
            libcairo2-dev \
            libwayland-dev \
            wayland-protocols

      - name: Install gtk4-layer-shell
        run: |
          set -euo pipefail
          git clone --depth 1 --branch v1.3.0 https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          meson setup /tmp/gtk4-layer-shell/build /tmp/gtk4-layer-shell \
            --prefix=/usr \
            -Dexamples=false \
            -Ddocs=false \
            -Dtests=false \
            -Dintrospection=false \
            -Dvapi=false
          meson compile -C /tmp/gtk4-layer-shell/build
          sudo meson install -C /tmp/gtk4-layer-shell/build
          sudo ldconfig
          pkg-config --exists gtk4-layer-shell-0

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build release
        run: zig build -Doptimize=ReleaseSafe -Dstrip

      - name: Run release checks
        run: zig build test -Doptimize=ReleaseSafe

      - name: Package release assets
        run: |
          set -euo pipefail
          mkdir -p dist

          test -x zig-out/bin/shaula
          tar -C zig-out -czf dist/shaula-linux-x86_64.tar.gz bin share
          tar -tzf dist/shaula-linux-x86_64.tar.gz > dist/TARCONTENTS

          required_paths=(
            "bin/shaula"
            "bin/shaula-overlay"
            "bin/shaula-preview"
            "bin/shaula-crop-image"
            "bin/shaula-portal-screenshot"
            "bin/shaula-settings"
            "share/icons/hicolor/index.theme"
            "share/icons/hicolor/256x256/apps/shaula.png"
            "share/icons/hicolor/512x512/apps/shaula.png"
            "share/icons/hicolor/scalable/actions/shaula-copy-symbolic.svg"
            "share/icons/hicolor/scalable/actions/shaula-save-symbolic.svg"
            "share/icons/hicolor/scalable/actions/shaula-spotlight-symbolic.svg"
            "share/shaula/integrations/noctalia/shaula/manifest.json"
            "share/shaula/integrations/noctalia/shaula/BarWidget.qml"
            "share/shaula/integrations/noctalia/shaula/README.md"
          )
          for path in "${required_paths[@]}"; do
            grep -Fxq "${path}" dist/TARCONTENTS || {
              echo "missing release payload path: ${path}" >&2
              exit 1
            }
          done

          top_level="$(awk -F/ 'NF { print $1 }' dist/TARCONTENTS | sort -u | tr '\n' ' ')"
          test "${top_level}" = "bin share "

          (
            cd dist
            sha256sum shaula-linux-x86_64.tar.gz > SHA256SUMS
            sha256sum -c SHA256SUMS
          )

      - name: Verify release install UX
        run: |
          set -euo pipefail

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT

          home_dir="${tmp_dir}/home"
          xdg_bin="${tmp_dir}/bin"
          xdg_data="${tmp_dir}/share"
          xdg_config="${tmp_dir}/config"
          fake_bin="${tmp_dir}/fake-bin"
          cache_log="${tmp_dir}/desktop-cache.log"
          mkdir -p \
            "${home_dir}" \
            "${xdg_bin}" \
            "${xdg_data}" \
            "${fake_bin}" \
            "${xdg_config}/niri" \
            "${xdg_config}/noctalia"

          cat > "${fake_bin}/gtk-update-icon-cache" <<'EOF'
          #!/bin/sh
          printf 'gtk-update-icon-cache %s\n' "$*" >> "${SHAULA_TEST_CACHE_LOG}"
          EOF
          cat > "${fake_bin}/update-desktop-database" <<'EOF'
          #!/bin/sh
          printf 'update-desktop-database %s\n' "$*" >> "${SHAULA_TEST_CACHE_LOG}"
          EOF
          chmod +x \
            "${fake_bin}/gtk-update-icon-cache" \
            "${fake_bin}/update-desktop-database"

          mkdir -p "${xdg_data}/icons/hicolor/scalable/apps"
          printf '<svg/>\n' > "${xdg_data}/icons/hicolor/scalable/apps/shaula.svg"

          printf '// fake niri config for installer detection\n' > "${xdg_config}/niri/config.kdl"
          printf '{"version":2,"states":{}}\n' > "${xdg_config}/noctalia/plugins.json"
          printf '{"bar":{"widgets":{"left":[],"center":[],"right":[]}}}\n' > "${xdg_config}/noctalia/settings.json"

          env \
            HOME="${home_dir}" \
            PATH="${fake_bin}:${PATH}" \
            XDG_BIN_HOME="${xdg_bin}" \
            XDG_DATA_HOME="${xdg_data}" \
            XDG_CONFIG_HOME="${xdg_config}" \
            SHAULA_TEST_CACHE_LOG="${cache_log}" \
            SHAULA_RELEASE_ASSET_URL="file://${PWD}/dist/shaula-linux-x86_64.tar.gz" \
            SHAULA_SHA256SUMS_URL="file://${PWD}/dist/SHA256SUMS" \
            scripts/install.sh --yes

          for binary in shaula shaula-overlay shaula-preview shaula-crop-image shaula-portal-screenshot shaula-settings; do
            test -x "${xdg_bin}/${binary}"
          done
          test -f "${xdg_data}/applications/shaula.desktop"
          test -f "${xdg_data}/icons/hicolor/scalable/actions/shaula-copy-symbolic.svg"
          test -f "${xdg_data}/icons/hicolor/256x256/apps/shaula.png"
          test -f "${xdg_data}/icons/hicolor/512x512/apps/shaula.png"
          test ! -e "${xdg_data}/icons/hicolor/scalable/apps/shaula.svg"
          grep -Fxq \
            "gtk-update-icon-cache -f -t ${xdg_data}/icons/hicolor" \
            "${cache_log}"
          grep -Fxq \
            "update-desktop-database -q ${xdg_data}/applications" \
            "${cache_log}"
          test -f "${xdg_config}/shaula/config.toml"
          grep -q "BEGIN SHAULA PREVIEW WINDOW RULE" "${xdg_config}/niri/config.kdl"
          test -f "${xdg_config}/noctalia/plugins/shaula/manifest.json"
          jq -e '.states.shaula.enabled == true' "${xdg_config}/noctalia/plugins.json" >/dev/null
          jq -e '.bar.widgets.right | any(.id == "plugin:shaula")' "${xdg_config}/noctalia/settings.json" >/dev/null

          env \
            HOME="${home_dir}" \
            XDG_BIN_HOME="${xdg_bin}" \
            XDG_DATA_HOME="${xdg_data}" \
            XDG_CONFIG_HOME="${xdg_config}" \
            "${xdg_bin}/shaula" doctor --json \
            | jq -e '.ok == true and .paths.config_exists == true and .noctalia.plugin_installed == true' >/dev/null

          env \
            HOME="${home_dir}" \
            XDG_BIN_HOME="${xdg_bin}" \
            XDG_DATA_HOME="${xdg_data}" \
            XDG_CONFIG_HOME="${xdg_config}" \
            "${xdg_bin}/shaula" capture area --dry-run --json \
            | jq -e '.ok == true and .command == "capture area" and .selection.cancelled == false' >/dev/null

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          prerelease_args=()
          case "${TAG_NAME}" in
            *alpha*|*beta*|*rc*) prerelease_args=(--prerelease) ;;
          esac

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "${TAG_NAME}" \
              "${prerelease_args[@]}"
            gh release upload "${TAG_NAME}" \
              dist/shaula-linux-x86_64.tar.gz \
              dist/SHA256SUMS \
              --clobber
          else
            gh release create "${TAG_NAME}" \
              dist/shaula-linux-x86_64.tar.gz \
              dist/SHA256SUMS \
              --title "${TAG_NAME}" \
              --generate-notes \
              "${prerelease_args[@]}"
          fi
